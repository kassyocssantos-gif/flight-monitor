name: flight-monitor

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC = 06:00 Brasilia (Hobby: 1x/dia)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Rodar monitor (dinheiro via fli)
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python monitor.py
      - name: Salvar historico
        run: |
          git config user.name "flight-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add history.csv state.json latest_report.md
          git commit -m "precos $(date -u +%F)" || echo "sem mudancas"
          git push || echo "push ignorado"
